name: Rank Monitor

on:
  schedule:
    # 每天北京时间 18:00 到 21:55，每 5 分钟执行一次
    # UTC 时间 10, 11, 12, 13 点对应北京时间的 18, 19, 20, 21 点
    - cron: '*/5 10-13 * * *'
  workflow_dispatch: # 允许手动点击运行按钮

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        env:
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          VILLAGE_ID: ${{ secrets.VILLAGE_ID }}
        run: python monitor.py

      - name: 保存数据状态并推送到仓库
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add last_data.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过保存"
          else
            git commit -m "自动更新: 数据发生变化"
            git push
            echo "历史数据已保存到仓库"
          fi
