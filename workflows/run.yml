name: Rank Monitor

on:
  schedule:
    - cron: '*/5 10,11 * * *'
    - cron: '0-30/5 12 * * *'
  workflow_dispatch:

permissions:
  contents: write # 必须：允许 Actions 将数据写回仓库

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行监控脚本
        env:
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
        run: python monitor.py

      # 核心逻辑：如果数据文件发生了改变，将文件提交并推送到代码库保存
      - name: 保存数据状态并推送到仓库
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add last_data.json
          # 检查是否有文件改变，有才进行 commit
          if git diff --staged --quiet; then
            echo "数据无变化，跳过保存"
          else
            git commit -m "自动更新: 数据发生变化"
            git push
            echo "历史数据已保存到仓库"
          fi
